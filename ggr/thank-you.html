        <style>
            .thank-you {
                display: flex;

            }

            .thank-card {
                background: #fff;
                padding: 2rem;

                box-shadow: 0 12px 30px rgba(8, 38, 25, 0.08);
                max-width: 720px;
            }

            .thank-card h1 {
                margin-bottom: 0.5rem;
            }

            .thank-card p {
                color: #3b5a4a;
            }
        </style>
    </head>

    <body>
        <main class="container">
            <section class="thank-you">
                <div class="thank-card">
                    <h1>Thanks — we received your message</h1>
                    <p>Our team will review your request and reply within 1 business day. For urgent orders, please call
                        <a href="tel:+256772722688">+256 772 722 688</a> or message us on WhatsApp.</p>
                    <p style="margin-top:1rem;"><a class="btn" href="index.html">Return to Home</a>
